name: CI (detection service)

on:
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/detection/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/detection
        run: pip install -r requirements-dev.txt

      - name: Test
        working-directory: services/detection
        run: python -m pytest
