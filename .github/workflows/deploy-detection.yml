name: Deploy Detection Service

on:
  push:
    branches: [main]
    paths:
      - services/detection/**
  workflow_dispatch:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/detection/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/detection
        run: pip install -r requirements-dev.txt

      - name: Test
        working-directory: services/detection
        run: python -m pytest

  deploy:
    name: Deploy to Cloud Run
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        working-directory: services/detection
        run: |
          gcloud run deploy go-board-detection \
            --source . \
            --region asia-southeast1 \
            --project cogent-silicon-274007 \
            --allow-unauthenticated \
            --set-secrets DETECTION_API_KEY=DETECTION_API_KEY:latest

      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe go-board-detection \
            --region asia-southeast1 \
            --project cogent-silicon-274007 \
            --format 'value(status.url)')
          for i in 1 2 3; do
            if curl --fail --silent "$SERVICE_URL/health"; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1
