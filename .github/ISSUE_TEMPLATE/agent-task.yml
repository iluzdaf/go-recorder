name: Agent Task
description: Implementation-ready feature, bug fix, polish, or refactor task.
title: "[Task]: "
labels: ["ready-for-agent"]
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Type
      options:
        - Bug fix
        - Feature
        - Polish
        - Refactor
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing or technical problem should this solve?
      placeholder: Users cannot...
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: Describe the target behavior after the change.
      placeholder: After this change...
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Concrete checklist for deciding whether the implementation is done.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Include implementation constraints, design constraints, and repo workflow requirements.
      value: |
        - Prefer minimal, focused diffs.
        - Do not try to visually test locally.
        - Preserve user changes in the worktree.
    validations:
      required: false
  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant files
      description: List likely files or areas. Agents should verify before editing.
      placeholder: |
        - components/GoBoard.tsx
        - lib/gameCorrectionUi.ts
        - tests/gameCorrectionUi.test.ts
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Expected non-visual checks for the implementation agent.
      value: |
        - pnpm typecheck
        - focused pnpm test target if logic changed
        - git diff --check
    validations:
      required: true
  - type: textarea
    id: smoke_tests
    attributes:
      label: Smoke tests
      description: Manual checks the reviewer expects before merge. Review agent may refine this list.
      placeholder: |
        - Open the preview deployment at ...
        - Confirm ...
    validations:
      required: false
