<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Go Recorder">
  <!-- Classic 8-stone windmill (kazaguruma): four 2-stone arms pinwheel around
       the centre. Dark minimalist board palette. -->
  <rect width="512" height="512" fill="#60606a"/>
  <g fill="none" stroke="#a1a1aa" stroke-width="9">
    <path d="M0 0V512M102 0V512M205 0V512M307 0V512M410 0V512M512 0V512"/>
    <path d="M0 0H512M0 102H512M0 205H512M0 307H512M0 410H512M0 512H512"/>
  </g>
  <g fill="#09090b">
    <circle cx="205" cy="102" r="45"/>
    <circle cx="205" cy="205" r="45"/>
    <circle cx="307" cy="307" r="45"/>
    <circle cx="307" cy="410" r="45"/>
  </g>
  <g fill="#fafafa" stroke="#18181b" stroke-width="10">
    <circle cx="307" cy="205" r="45"/>
    <circle cx="410" cy="205" r="45"/>
    <circle cx="102" cy="307" r="45"/>
    <circle cx="205" cy="307" r="45"/>
  </g>
</svg>
